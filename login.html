<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - MindMap</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>MindMap</h1>
                <p>Connectez-vous pour acceder a vos cartes</p>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="togglePassword" tabindex="-1" aria-label="Afficher le mot de passe">
                            <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle class="eye-open" cx="12" cy="12" r="3"/>
                                <line class="eye-slash" x1="1" y1="1" x2="23" y2="23" style="display:none"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="loginError" class="auth-error hidden"></div>
                <button type="submit" class="auth-btn">Se connecter</button>
            </form>
        </div>
    </div>
    <script>
        // Password visibility toggle
        const toggleBtn = document.getElementById('togglePassword');
        const pwdInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const visible = pwdInput.type === 'text';
            pwdInput.type = visible ? 'password' : 'text';
            toggleBtn.querySelector('.eye-slash').style.display = visible ? 'none' : '';
            toggleBtn.setAttribute('aria-label', visible ? 'Afficher le mot de passe' : 'Masquer le mot de passe');
        });

        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            errorEl.textContent = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorEl.textContent = 'Veuillez remplir tous les champs.';
                errorEl.classList.remove('hidden');
                return;
            }

            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Connexion...';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await resp.json();

                if (!resp.ok) {
                    errorEl.textContent = data.error || 'Erreur de connexion';
                    errorEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Se connecter';
                    return;
                }

                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = 'Impossible de contacter le serveur.';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
