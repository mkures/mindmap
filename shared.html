<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MindMap partagée</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        #sharedHeader {
            padding: 8px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        #sharedTitle {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
        }
        #sharedBadge {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: var(--surface-hover);
            padding: 3px 10px;
            border-radius: 20px;
        }
        #sharedFit {
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-raised);
            color: var(--text-secondary);
            cursor: pointer;
        }
        #sharedContainer {
            position: relative;
            width: 100%;
            height: calc(100vh - 45px);
            overflow: hidden;
            background: var(--canvas);
        }
        #sharedSvg {
            width: 100%;
            height: 100%;
        }
        #sharedError {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-secondary);
            font-size: 16px;
        }
        /* Note modal */
        #sharedNoteOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        #sharedNoteOverlay.open { display: flex; }
        #sharedNoteBox {
            background: var(--surface);
            border-radius: var(--radius-md, 8px);
            padding: 20px 24px;
            max-width: 520px;
            width: 90vw;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        #sharedNoteTitle {
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
        }
        #sharedNoteBody {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }
        #sharedNoteBody h1, #sharedNoteBody h2, #sharedNoteBody h3 {
            color: var(--text);
            margin: 12px 0 6px;
        }
        #sharedNoteBody ul, #sharedNoteBody ol { padding-left: 20px; }
        #sharedNoteBody code {
            background: var(--surface-hover);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 12px;
        }
        #sharedNoteBody pre {
            background: var(--surface-hover);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .collapse-indicator { cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.4/purify.min.js" integrity="sha384-nSPPn01ry1wMKWnpMRGBMkNTGLJMnyzFDclWyJFy/M0n9E4j8bVxb6GO4+6SEbH" crossorigin="anonymous"></script>
</head>
<body>
    <div id="sharedHeader" class="hidden">
        <span id="sharedTitle">MindMap</span>
        <span id="sharedBadge">Vue partagée (lecture seule)</span>
        <button id="sharedFit">Centrer</button>
    </div>
    <div id="sharedContainer" class="hidden">
        <svg id="sharedSvg">
            <g id="sharedViewport"></g>
        </svg>
    </div>
    <div id="sharedError" class="hidden">Carte introuvable ou lien expiré.</div>

    <!-- Note overlay -->
    <div id="sharedNoteOverlay">
        <div id="sharedNoteBox">
            <div id="sharedNoteTitle"></div>
            <div id="sharedNoteBody"></div>
        </div>
    </div>

    <script type="module">
        import { layout } from '/src/layout.js';
        import { render } from '/src/render.js';
        import { toggleCollapse } from '/src/model.js';

        const token = location.pathname.split('/s/')[1];
        if (!token) {
            showError();
        } else {
            loadShared(token);
        }

        async function loadShared(token) {
            try {
                const resp = await fetch(`/api/shared/${token}`);
                if (!resp.ok) { showError(); return; }
                const data = await resp.json();
                const map = data.map;
                if (!map || !map.nodes) { showError(); return; }
                document.title = (data.title || 'MindMap') + ' – Vue partagée';
                document.getElementById('sharedTitle').textContent = data.title || 'MindMap';
                document.getElementById('sharedHeader').classList.remove('hidden');
                document.getElementById('sharedContainer').classList.remove('hidden');

                const svg = document.getElementById('sharedSvg');
                const viewport = document.getElementById('sharedViewport');
                let pan = { x: 0, y: 0, scale: 1 };

                function redraw() {
                    layout(map);
                    render(map, viewport, null);
                }

                redraw();

                // Center view
                function fit() {
                    const bbox = viewport.getBBox();
                    const w = svg.clientWidth;
                    const h = svg.clientHeight;
                    if (!bbox.width || !bbox.height) return;
                    const scale = Math.min(1, w / (bbox.width + 80), h / (bbox.height + 80));
                    pan.scale = scale;
                    pan.x = -bbox.x * scale + (w - bbox.width * scale) / 2;
                    pan.y = -bbox.y * scale + (h - bbox.height * scale) / 2;
                    viewport.setAttribute('transform', `translate(${pan.x},${pan.y}) scale(${pan.scale})`);
                }

                requestAnimationFrame(fit);
                document.getElementById('sharedFit').onclick = fit;

                // ── Collapse/expand on click ──
                svg.addEventListener('click', e => {
                    // Collapse indicator click
                    const collapseEl = e.target.closest('.collapse-indicator');
                    if (collapseEl) {
                        const nodeEl = collapseEl.closest('.node');
                        if (nodeEl) {
                            e.preventDefault();
                            e.stopPropagation();
                            toggleCollapse(map, nodeEl.dataset.id);
                            redraw();
                            viewport.setAttribute('transform', `translate(${pan.x},${pan.y}) scale(${pan.scale})`);
                            return;
                        }
                    }

                    // Node click — expand if collapsed, or show note
                    const nodeEl = e.target.closest('.node');
                    if (nodeEl) {
                        const nodeId = nodeEl.dataset.id;
                        const node = map.nodes[nodeId];
                        if (!node) return;

                        // If collapsed, expand on click
                        if (node.collapsed) {
                            toggleCollapse(map, nodeId);
                            redraw();
                            viewport.setAttribute('transform', `translate(${pan.x},${pan.y}) scale(${pan.scale})`);
                            return;
                        }

                        // If has a note/body, show it
                        if (node.body) {
                            showNote(node.text || 'Note', node.body);
                        }
                    }
                });

                // ── Note overlay ──
                const noteOverlay = document.getElementById('sharedNoteOverlay');
                const noteTitle = document.getElementById('sharedNoteTitle');
                const noteBody = document.getElementById('sharedNoteBody');

                function showNote(title, body) {
                    noteTitle.textContent = title;
                    noteBody.innerHTML = typeof DOMPurify !== 'undefined'
                        ? DOMPurify.sanitize(marked.parse(body))
                        : '';
                    noteOverlay.classList.add('open');
                }

                noteOverlay.addEventListener('click', e => {
                    if (e.target === noteOverlay) {
                        noteOverlay.classList.remove('open');
                    }
                });

                // ── Pan & zoom (readonly) ──
                let isPanning = false, panStart = { x: 0, y: 0 };
                svg.addEventListener('mousedown', e => {
                    if (e.target.closest('.node') || e.target.closest('.collapse-indicator')) return;
                    if (e.button !== 0) return;
                    isPanning = true;
                    panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
                });
                document.addEventListener('mousemove', e => {
                    if (!isPanning) return;
                    pan.x = e.clientX - panStart.x;
                    pan.y = e.clientY - panStart.y;
                    viewport.setAttribute('transform', `translate(${pan.x},${pan.y}) scale(${pan.scale})`);
                });
                document.addEventListener('mouseup', () => { isPanning = false; });
                svg.addEventListener('wheel', e => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    pan.scale = Math.min(5, Math.max(0.05, pan.scale + delta));
                    viewport.setAttribute('transform', `translate(${pan.x},${pan.y}) scale(${pan.scale})`);
                }, { passive: false });

                // ── Touch support ──
                let touchStart = null, lastTouchDist = 0;
                svg.addEventListener('touchstart', e => {
                    if (e.touches.length === 1) {
                        const t = e.touches[0];
                        // Don't start pan on nodes
                        if (e.target.closest('.node') || e.target.closest('.collapse-indicator')) return;
                        touchStart = { x: t.clientX - pan.x, y: t.clientY - pan.y };
                    } else if (e.touches.length === 2) {
                        touchStart = null;
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        lastTouchDist = Math.sqrt(dx * dx + dy * dy);
                    }
                }, { passive: true });
                svg.addEventListener('touchmove', e => {
                    if (e.touches.length === 1 && touchStart) {
                        e.preventDefault();
                        const t = e.touches[0];
                        pan.x = t.clientX - touchStart.x;
                        pan.y = t.clientY - touchStart.y;
                        viewport.setAttribute('transform', `translate(${pan.x},${pan.y}) scale(${pan.scale})`);
                    } else if (e.touches.length === 2) {
                        e.preventDefault();
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (lastTouchDist > 0) {
                            const ratio = dist / lastTouchDist;
                            pan.scale = Math.min(5, Math.max(0.05, pan.scale * ratio));
                            viewport.setAttribute('transform', `translate(${pan.x},${pan.y}) scale(${pan.scale})`);
                        }
                        lastTouchDist = dist;
                    }
                }, { passive: false });
                svg.addEventListener('touchend', () => {
                    touchStart = null;
                    lastTouchDist = 0;
                });

            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function showError() {
            document.getElementById('sharedError').classList.remove('hidden');
        }
    </script>
</body>
</html>
